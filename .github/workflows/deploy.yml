name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy App to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ⬇️ Increase timeouts here
          command_timeout: 60m   # default is 10m
          timeout: 120s          # SSH connect timeout, default is 30s
          script: |
            echo "➡️ Pulling latest changes..."
            cd /opt/zaytra_ai
            git pull origin main

            COMMIT_HASH=$(git rev-parse --short HEAD)
            echo "🔖 Using tag: $COMMIT_HASH"

            echo "🛠️ Building Docker image with tag..."
            TAG=$COMMIT_HASH docker compose build --no-cache

            echo "♻️ Replacing old containers with new ones..."
            TAG=$COMMIT_HASH docker compose up -d --force-recreate

            echo "✅ Deployment complete!"
